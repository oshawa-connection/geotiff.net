server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Enable static file serving
        try_files $uri $uri/ =404;

        # Explicitly ensure range requests are supported
        add_header Accept-Ranges bytes;

        # Optional: optimize large file delivery
        sendfile on;
        tcp_nopush on;
        aio on;
    }
}